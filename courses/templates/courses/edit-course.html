
{%extends 'layout.html'%}
{%load static%}

Create Course
{%block content %}
<div class="container mt-3">
        <div class="row">
            <div class="col-12">

                {% if error %}
                <div class="alert alert-danger">
                    {{msg}}
                </div>
                {%endif%}
                <!--novalide -> tarayıcı doğrulamasını kapat. kontrol djangoda -->
            <form method="POST" novalidate enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3 {%if field.errors%} invalid {%endif%}">{%if field.errors%}<div class="alert alert-danger">{{field.errors}}</div>{%endif%}
                    <label class="form-label" for="{{field.id_for_label}}"> {{field.label}}</label>
                    {{field}}

                    </div>
                {% endfor %}

               
               
                <button class="btn btn-primary" type="submit">Kaydet</button>
            </form>                  
               
            </div>       
        </div>
    </div>
{%endblock%}
